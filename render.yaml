services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: flywallet-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false          # you'll paste this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: FRONTEND_URL
        value: https://flywallet-frontend.onrender.com

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: flywallet-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
